# cargo-deny configuration (v0.19+)
# Run with: cargo deny check

[licenses]
version = 2

# Permissive licenses only. No copyleft.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "MPL-2.0",
]

[advisories]
# Unmaintained transitive deps from upstream (iroh dep tree) — not actionable by us.
ignore = [
    "RUSTSEC-2023-0089", # atomic-polyfill: unmaintained (transitive via iroh)
    "RUSTSEC-2024-0436", # paste: unmaintained (transitive via iroh)
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
